version: "3.9"

services:
  discovery-server:
    build:
      context: .
      dockerfile: okpi-discovery-server/Dockerfile
    container_name: okpi-discovery-server
    restart: unless-stopped
    ports:
      - "8761:8761"

  mysql-auth:
    image: mysql:8.0
    container_name: okpi-mysql-auth
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: okpi_auth
    ports:
      - "3307:3306"
    volumes:
      - mysql-auth-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  mysql-objective:
    image: mysql:8.0
    container_name: okpi-mysql-objective
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: okpi_objective
    ports:
      - "3308:3306"
    volumes:
      - mysql-objective-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  auth-service:
    build:
      context: .
      dockerfile: okpi-auth-service/Dockerfile
    container_name: okpi-auth-service
    restart: unless-stopped
    depends_on:
      discovery-server:
        condition: service_started
      mysql-auth:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-auth:3306/okpi_auth
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka/
      JWT_SECRET: ${JWT_SECRET:-dGhpcy1pcy1hLWRldi1zZWNyZXQta2V5LWF0LWxlYXN0LTMyLWJ5dGVz}
    ports:
      - "8081:8081"

  objective-service:
    build:
      context: .
      dockerfile: okpi-objective-service/Dockerfile
    container_name: okpi-objective-service
    restart: unless-stopped
    depends_on:
      discovery-server:
        condition: service_started
      mysql-objective:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-objective:3306/okpi_objective
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka/
    ports:
      - "8083:8083"

  mysql-kpi:
    image: mysql:8.0
    container_name: okpi-mysql-kpi
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: okpi_kpi
    ports:
      - "3309:3306"
    volumes:
      - mysql-kpi-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  kpi-service:
    build:
      context: .
      dockerfile: okpi-kpi-service/Dockerfile
    container_name: okpi-kpi-service
    restart: unless-stopped
    depends_on:
      discovery-server:
        condition: service_started
      mysql-kpi:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-kpi:3306/okpi_kpi
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka/
    ports:
      - "8084:8084"

  api-gateway:
    build:
      context: .
      dockerfile: okpi-api-gateway/Dockerfile
    container_name: okpi-api-gateway
    restart: unless-stopped
    depends_on:
      discovery-server:
        condition: service_started
      auth-service:
        condition: service_started
      objective-service:
        condition: service_started
      kpi-service:
        condition: service_started
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka/
      JWT_SECRET: ${JWT_SECRET:-dGhpcy1pcy1hLWRldi1zZWNyZXQta2V5LWF0LWxlYXN0LTMyLWJ5dGVz}
    ports:
      - "8080:8080"

volumes:
  mysql-auth-data:
  mysql-objective-data:
  mysql-kpi-data:
