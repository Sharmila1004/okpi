version: "3.8"

services:

  mysql1:
    image: mysql:8.0
    container_name: mysql-okpi-1
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: okpidb1
    ports:
      - "3307:3306"
    volumes:
      - mysql1-data:/var/lib/mysql

  mysql2:
    image: mysql:8.0
    container_name: mysql-okpi-2
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: okpidb2
    ports:
      - "3308:3306"
    volumes:
      - mysql2-data:/var/lib/mysql

  mysql3:
    image: mysql:8.0
    container_name: mysql-okpi-3
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: okpidb3
    ports:
      - "3309:3306"
    volumes:
      - mysql3-data:/var/lib/mysql

volumes:
  mysql1-data:
  mysql2-data:
  mysql3-data: