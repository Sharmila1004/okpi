# Run auth from the IDE while infra is up via: docker compose up -d
# IntelliJ VM options or env: --spring.profiles.active=local
# Uses host ports from docker-compose.yml (no conflict with container auth on 18081).

server.port=9081
spring.datasource.url=jdbc:mysql://localhost:3307/okpi_auth
spring.datasource.username=root
spring.datasource.password=root
eureka.client.service-url.defaultZone=http://localhost:8762/eureka/
