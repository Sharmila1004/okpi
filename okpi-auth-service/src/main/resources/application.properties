# SERVER
server.port=${SERVER_PORT:8081}

spring.application.name=OKPI-AUTH-SERVICE

# DATABASE CONFIG
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://mysql-auth:3306/okpi_auth}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / HIBERNATE
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# FLYWAY
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# EUREKA
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.service-url.defaultZone=${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://discovery-server:8761/eureka/}
eureka.instance.prefer-ip-address=true

# JWT
jwt.secret=${JWT_SECRET:dGhpcy1pcy1hLWRldi1zZWNyZXQta2V5LWF0LWxlYXN0LTMyLWJ5dGVz}
jwt.expireMs=${JWT_EXPIRE_MS:86400000}

# LOGGING
logging.level.root=${LOGGING_LEVEL_ROOT:INFO}

#SWAGGER
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
