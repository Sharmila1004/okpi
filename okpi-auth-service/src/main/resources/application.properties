# Single application.properties consolidated from application.yml + application-dev.yml + application-prod.yml
#
# IDE + Docker MySQL/Eureka: use --spring.profiles.active=local (see application-local.properties).
#
# If startup fails with Failed to start bean 'webServerStartStop', port 8081 is usually taken
# (e.g. okpi-auth-service from Docker). Stop that container or set SERVER_PORT to another port.
server.port=${SERVER_PORT:8081}

spring.application.name=OKPI-AUTH-SERVICE

# DataSource (env vars override defaults)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/okpi_auth}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:Qwertyuiop@13.}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# Eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
# Try both: native Eureka on 8761, Docker-mapped Eureka on 8762 (see docker-compose discovery-server ports)
eureka.client.service-url.defaultZone=${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/,http://localhost:8762/eureka/}
eureka.instance.prefer-ip-address=true

# JWT
jwt.secret=${JWT_SECRET:dGhpcy1pcy1hLWRldi1zZWNyZXQta2V5LWF0LWxlYXN0LTMyLWJ5dGVz}
jwt.expireMs=${JWT_EXPIRE_MS:86400000}

# Logging (default to INFO, override with env var LOGGING_LEVEL_ROOT)
logging.level.root=${LOGGING_LEVEL_ROOT:INFO}

# Swagger / OpenAPI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
